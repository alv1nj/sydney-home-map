<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#123c85">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="apple-mobile-web-app-title" content="悉尼购房助手">
<title>悉尼购房助手</title>
<style>
  :root {
    --blue:#1d4fa8; --blue-dark:#0f2f6d;
    --teal:#168388; --teal-dark:#0e5a5e;
    --ink:#1d1d1f; --ink2:#6e6e73; --ink3:#aeaeb2;
    --paper:#f7f6f2;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; }
  #app { display:flex; flex-direction:column; height:100%; height:100dvh; }

  /* ── 顶栏 ── */
  header {
    background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 62%,#3e77d8 100%);
    color:#fff; padding:12px 16px calc(12px);
    padding-top:calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; gap:12px; z-index:30;
    box-shadow:0 1px 0 rgba(255,255,255,.15) inset, 0 4px 18px rgba(15,47,109,.35);
  }
  .roundel {
    width:38px; height:38px; border-radius:50%; flex:none;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .roundel svg { width:24px; height:24px; display:block; }
  header .titles { flex:1; min-width:0; }
  header h1 { font-size:17px; font-weight:700; letter-spacing:.3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .sub { font-size:11px; opacity:.75; margin-top:1px; font-weight:500; letter-spacing:.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header button {
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35);
    color:#fff; border-radius:18px; padding:6px 13px; font-size:13px; font-weight:600;
    backdrop-filter:blur(8px); flex:none;
  }

  #mapWrap { flex:1; position:relative; overflow:hidden; touch-action:none;
    background:
      radial-gradient(1200px 800px at 75% 30%, #ffffff 0%, transparent 60%),
      var(--paper); }
  svg#map { width:100%; height:100%; display:block; cursor:grab; }

  .glass {
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(16px) saturate(1.5);
    -webkit-backdrop-filter:blur(16px) saturate(1.5);
    border:1px solid rgba(0,0,0,.06);
    box-shadow:0 8px 28px rgba(20,40,50,.14), 0 1px 0 rgba(255,255,255,.9) inset;
  }

  /* ── 图例 ── */
  #legend {
    position:absolute; top:12px; left:12px; z-index:20;
    border-radius:16px; padding:12px 15px;
    font-size:12px; line-height:1.95; max-width:250px; display:none;
    max-height:calc(100% - 90px); overflow-y:auto;
  }
  #legend.show { display:block; }
  #legend .row { display:flex; align-items:center; gap:9px; font-weight:500; white-space:nowrap; }
  #legend .sw { width:26px; height:5px; border-radius:3px; flex:none; }
  #legend .swd { width:26px; height:0; border-top:4.5px dashed; border-radius:3px; flex:none; }
  #legend .yr { margin-left:auto; font-size:10px; font-weight:700; color:#fff;
    border-radius:8px; padding:1px 7px; }
  #legend .note { font-size:10.5px; color:var(--ink2); line-height:1.55; margin-top:8px;
    border-top:1px solid rgba(0,0,0,.08); padding-top:8px; font-weight:400; white-space:normal; }
  #legend a { color:var(--blue); font-weight:600; text-decoration:none; }

  /* ── 搜索 ── */
  #searchBox {
    position:absolute; top:12px; right:12px; z-index:22; width:min(62%, 300px);
    border-radius:16px; padding:8px 10px; display:none;
  }
  #searchBox.show { display:block; }
  #searchBox input { width:100%; border:none; outline:none; background:transparent;
    font-size:15px; font-weight:600; color:var(--ink); }
  #searchRes { margin-top:4px; max-height:280px; overflow-y:auto; }
  .srItem { display:flex; align-items:center; gap:8px; padding:8px 4px;
    border-top:1px solid rgba(0,0,0,.06); cursor:pointer; }
  .srItem .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .srItem .n { font-size:13.5px; font-weight:700; }
  .srItem .e { font-size:10.5px; color:var(--ink2); }
  .srItem .lns { margin-left:auto; font-size:9.5px; font-weight:800; color:var(--ink2); flex:none; }

  /* ── 缩放控件 ── */
  #zoomCtrl {
    position:absolute; right:12px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:20;
    border-radius:22px; overflow:hidden; display:flex; flex-direction:column;
  }
  #zoomCtrl button {
    width:44px; height:44px; border:none; background:transparent;
    font-size:19px; color:var(--blue-dark); font-weight:600;
  }
  #zoomCtrl button:not(:last-child){ border-bottom:1px solid rgba(0,0,0,.07); }
  #zoomCtrl button:active { background:rgba(29,79,168,.12); }

  /* ── 底部详情卡 ── */
  #sheet {
    position:absolute; left:10px; right:10px;
    bottom:calc(10px + env(safe-area-inset-bottom)); z-index:40;
    border-radius:22px; padding:16px 18px 18px;
    transform:translateY(calc(100% + 40px));
    transition:transform .45s cubic-bezier(.32,.72,.24,1);
    max-height:70%; overflow-y:auto;
  }
  #sheet.show { transform:translateY(0); }
  #sheet .accent { position:absolute; left:0; top:0; bottom:0; width:5px;
    border-radius:22px 0 0 22px; }
  #sheet .handle { width:36px; height:4.5px; background:rgba(0,0,0,.15);
    border-radius:3px; margin:0 auto 12px; }
  #sheet h2 { font-size:21px; font-weight:800; letter-spacing:.2px; }
  #sheet .en { font-size:13px; color:var(--ink2); margin:2px 0 10px; font-weight:500; }
  #sheet .badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .badge { font-size:11px; font-weight:600; padding:4px 11px; border-radius:20px; color:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .badge.outline { background:#fff !important; box-shadow:none; }

  .cbdCard { display:flex; align-items:center; gap:12px;
    background:rgba(29,79,168,.08); border:1px solid rgba(29,79,168,.18);
    border-radius:14px; padding:11px 14px; margin-bottom:10px; }
  .cbdCard .icon { font-size:20px; }
  .cbdCard .k { font-size:10.5px; color:var(--ink2); font-weight:600; letter-spacing:.3px; }
  .cbdCard .v { font-size:16px; font-weight:800; margin-top:1px; }
  .cbdCard .v small { font-size:11px; font-weight:500; color:var(--ink2); }

  /* 海拔/洪水 双格 */
  .duo { display:flex; gap:8px; margin-bottom:10px; }
  .duo .cell { flex:1; border-radius:14px; padding:10px 13px;
    background:rgba(0,0,0,.035); border:1px solid rgba(0,0,0,.06); }
  .duo .k { font-size:10.5px; color:var(--ink2); font-weight:600; }
  .duo .v { font-size:19px; font-weight:800; margin-top:2px; }
  .duo .v small { font-size:11px; font-weight:600; color:var(--ink2); }
  .flBadge { display:inline-block; font-size:13px; font-weight:800; color:#fff;
    border-radius:9px; padding:3px 12px; margin-top:2px; }
  .flNote { border-radius:12px; padding:9px 13px; margin:-4px 0 10px;
    background:rgba(224,123,31,.09); border:1px dashed rgba(224,123,31,.4);
    font-size:11.5px; color:#8a5514; font-weight:500; line-height:1.5; }

  .lgaCard { border-radius:14px; padding:11px 14px 8px; background:rgba(0,0,0,.035);
    border:1px solid rgba(0,0,0,.06); margin-bottom:10px; }
  .lgaCard .lh { font-size:11px; font-weight:800; color:var(--ink2);
    letter-spacing:.4px; margin-bottom:6px; }
  .lgaRow { display:flex; gap:8px; padding:5.5px 0; font-size:12px; align-items:baseline; }
  .lgaRow + .lgaRow { border-top:1px dashed rgba(0,0,0,.07); }
  .lgaRow .ic { flex:none; width:18px; text-align:center; }
  .lgaRow .k { flex:none; width:78px; color:var(--ink2); font-weight:600; font-size:11px; }
  .lgaRow .v { flex:1; font-weight:600; line-height:1.5; }
  .lgaRow .v small { color:var(--ink2); font-weight:500; }
  .safeBadge { font-size:10.5px; font-weight:800; color:#fff; border-radius:8px;
    padding:1.5px 8px; margin-right:6px; white-space:nowrap; }
  .stars { color:#e8a30f; letter-spacing:2px; font-size:13px; }
  .stars .off { color:rgba(0,0,0,.15); }

  .reaBtn { display:flex; align-items:center; gap:10px; text-decoration:none;
    background:linear-gradient(135deg,#e4002b,#c30023); color:#fff;
    border-radius:14px; padding:12px 15px; margin-bottom:10px;
    box-shadow:0 3px 10px rgba(228,0,43,.3); }
  .reaBtn:active { transform:scale(.985); }
  .reaBtn .ri { font-size:19px; flex:none; }
  .reaBtn .rt { flex:1; }
  .reaBtn .rt .t1 { display:block; font-size:13.5px; font-weight:800; }
  .reaBtn .rt .t2 { display:block; font-size:10px; opacity:.8; font-weight:500; margin-top:1px; }
  .reaBtn .ra { flex:none; font-size:15px; font-weight:700; opacity:.85; }
  .reaBtn.sold { background:linear-gradient(135deg,#5a4fcf,#3f37a3);
    box-shadow:0 3px 10px rgba(90,79,207,.3); }
  .reaBtn.gmap { background:linear-gradient(135deg,#4285f4,#1a73e8);
    box-shadow:0 3px 10px rgba(26,115,232,.3); }

  #sheet .foot { font-size:10px; color:var(--ink3); margin-top:11px; line-height:1.5; }
  #closeSheet { position:absolute; right:14px; top:14px; border:none;
    background:rgba(0,0,0,.06); width:29px; height:29px; border-radius:50%;
    font-size:13px; color:var(--ink2); font-weight:700; }

  .stn { cursor:pointer; }
  /* 缩放分级标签：p1/p2 随缩放出现；p3=避让失败降级(深缩放才显示)；中文小字 z2 起显示 */
  svg[data-z="0"] .p1, svg[data-z="0"] .p2, svg[data-z="0"] .p3,
  svg[data-z="1"] .p2, svg[data-z="1"] .p3,
  svg[data-z="2"] .p3 { display:none; }
  svg[data-z="0"] .zh2, svg[data-z="1"] .zh2 { display:none; }

  /* ── 行程规划 ── */
  #map.navOn .dimmable { opacity:.28; transition:opacity .25s; }
  #navBar {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:24; border-radius:16px; padding:9px 36px 9px 15px;
    display:none; max-width:min(92%, 430px);
  }
  #navBar.show { display:block; }
  #navBar .t1 { font-size:13px; font-weight:800; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  #navBar .t2 { font-size:10.5px; color:var(--ink2); margin-top:2.5px; line-height:1.5; }
  #navBar .warn { color:#8a5514; }
  #navBar #navClose { position:absolute; right:8px; top:8px; border:none;
    background:rgba(0,0,0,.07); width:22px; height:22px; border-radius:50%;
    font-size:10px; color:var(--ink2); font-weight:700; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="roundel"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="#1d4fa8">
        <path d="M50,12 L92,48 L84,48 L84,88 L60,88 L60,62 L40,62 L40,88 L16,88 L16,48 L8,48 Z"/>
      </g><rect x="12" y="92" width="76" height="6" rx="3" fill="#1d4fa8"/></svg></div>
    <div class="titles">
      <h1>悉尼购房助手</h1>
      <div class="sub">Sydney Rail & Property · 2026年7月</div>
    </div>
    <button id="searchBtn">搜索</button>
    <button id="legendBtn">图例</button>
  </header>

  <div id="mapWrap">
    <div id="legend" class="glass"></div>

    <div id="searchBox" class="glass">
      <input id="searchInput" type="search" placeholder="搜索站点 / 郊区…" autocomplete="off">
      <div id="searchRes"></div>
    </div>

    <div id="navBar" class="glass"></div>

    <div id="zoomCtrl" class="glass">
      <button id="zin">＋</button>
      <button id="zout">－</button>
      <button id="zreset" style="font-size:15px">⟲</button>
    </div>

    <svg id="map" xmlns="http://www.w3.org/2000/svg" data-z="0"></svg>

    <div id="sheet" class="glass">
      <div class="accent" id="sAccent"></div>
      <div class="handle"></div>
      <button id="closeSheet">✕</button>
      <h2 id="sName"></h2>
      <div class="en" id="sEn"></div>
      <div class="badges" id="sBadges"></div>
      <div id="sBody"></div>
      <div class="foot" id="sFoot"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="stations.js"></script>
<script src="schematic.js"></script>
<script>
"use strict";
// ════════ 概示图坐标（东京地铁风格：八向直线+圆角，坐标见 schematic.js） ════════
// K：全图紧凑系数（等比缩放保持45°角；标签字号不变→地图更紧凑）
const K=0.82;
for(const id in SXY) SXY[id]=[SXY[id][0]*K, SXY[id][1]*K];
for(const rk in BENDS) for(const id in BENDS[rk])
  BENDS[rk][id]=BENDS[rk][id].map(b=>[b[0]*K, b[1]*K]);
for(const b of BADGES){ b[1]*=K; b[2]*=K; }
for(const s of STATIONS){ [s.x,s.y]=SXY[s.id];
  if(s.p===undefined) s.p = s.hub?0:2; if(!s.g) s.g=3; }

const svg = document.getElementById("map");
const NS = "http://www.w3.org/2000/svg";
const $id = id => STATIONS.find(s=>s.id===id);
function el(tag, attrs, parent){ const e=document.createElementNS(NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); (parent||svg).appendChild(e); return e; }

function roundedPath(pts, r){
  pts=pts.filter((p,i)=>!i||Math.hypot(p[0]-pts[i-1][0],p[1]-pts[i-1][1])>0.01);
  const n=pts.length, seg=(a,b)=>Math.hypot(b[0]-a[0],b[1]-a[1]);
  const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
  let d=`M${pts[0][0]},${pts[0][1]} `;
  for(let i=1;i<n-1;i++){
    const p=pts[i], prev=pts[i-1], next=pts[i+1];
    const r1=Math.min(r, seg(prev,p)/2), r2=Math.min(r, seg(p,next)/2);
    const a=lerp(p,prev,r1/seg(prev,p)), b=lerp(p,next,r2/seg(p,next));
    d += `L${a[0]},${a[1]} Q${p[0]},${p[1]} ${b[0]},${b[1]} `;
  }
  return d+`L${pts[n-1][0]},${pts[n-1][1]}`;
}

// ════════ 底图：示意水系（东京风格的极简提示） ════════
const defs=el("defs",{});
const f=el("filter",{id:"softShadow",x:"-40%",y:"-40%",width:"180%",height:"180%"},defs);
el("feDropShadow",{dx:"0",dy:"1.2",stdDeviation:"1.6","flood-opacity":"0.3"},f);
const gWater = el("g",{});
el("rect",{x:520*K,y:449*K,width:296*K,height:12,rx:6,fill:"#cfe3f0",opacity:"0.85"},gWater);
el("ellipse",{cx:854*K,cy:726*K,rx:40*K,ry:22*K,fill:"#cfe3f0",opacity:"0.7"},gWater);
{
  const t1=el("text",{x:530*K,y:449*K-4,"font-size":"8.5",fill:"#7da7c4","font-style":"italic"},gWater);
  t1.textContent="Sydney Harbour";
  const t2=el("text",{x:854*K,y:726*K+2,"font-size":"7.5",fill:"#7da7c4","font-style":"italic",
    "text-anchor":"middle"},gWater);
  t2.textContent="Botany Bay";
}

// ════════ 线路 ════════
// 反向缩放登记表：BW=按缩放变细的描边  ANCH=围绕锚点整体缩小的组
const BW=[], ANCH=[], NAVBW=[], NAVANCH=[];
const gLines = el("g",{class:"dimmable"});
for(const rk in ROUTES){
  const lk = ROUTE_LINE[rk] || rk;
  const L = LINES[lk];
  const off = ROUTE_OFF[rk] || [0,0];
  const bd = BENDS[rk]||{};
  const pts=[];
  for(const id of ROUTES[rk]){
    const s=$id(id);
    pts.push([s.x+off[0], s.y+off[1]]);
    for(const b of (bd[id]||[])) pts.push([b[0]+off[0], b[1]+off[1]]);
  }
  const d = roundedPath(pts,10);
  const wMain = L.lr ? 2.6 : 4.4;   // 东京风格：干线统一线宽
  BW.push({el:el("path",{d,fill:"none",stroke:"#fff","stroke-width":wMain+2.4,
    "stroke-linecap":"round","stroke-linejoin":"round",opacity:"0.85"},gLines), w:wMain+2.4});
  BW.push({el:el("path",{d,fill:"none",stroke:L.color,"stroke-width":wMain,
    "stroke-linecap":"round","stroke-linejoin":"round",
    ...(L.open?{}:{"stroke-dasharray":"7 5"})},gLines), w:wMain});
}
// 线路徽标（悉尼原版线路标识：彩色圆徽+线路号，挂在线路末端）
const gBadges = el("g",{class:"dimmable"});
for(const [lk,bx,by] of BADGES){
  const L=LINES[lk];
  const g=el("g",{},gBadges);
  el("circle",{cx:bx,cy:by,r:7.5,fill:L.color,stroke:"#fff","stroke-width":"1.3",
    filter:"url(#softShadow)"},g);
  const t=el("text",{x:bx,y:by+2.4,"text-anchor":"middle","font-size":"6.6",
    fill:"#fff","font-weight":"800","letter-spacing":"0.2"},g);
  t.textContent=lk;
  ANCH.push([g,bx,by]);
}
// 未通车线路年份标签
const YEAR_TAGS=[ {rk:"MSW",text:"2026",idx:5,dy:16}, {rk:"MA",text:"2027",idx:2,dy:-14},
                  {rk:"MW",text:"2032",idx:5,dy:-14} ];
for(const tg of YEAR_TAGS){
  const lk=ROUTE_LINE[tg.rk]||tg.rk, L=LINES[lk];
  const s=$id(ROUTES[tg.rk][tg.idx]);
  const g=el("g",{},gLines);
  el("rect",{x:s.x-17,y:s.y+tg.dy-9,width:34,height:15,rx:7.5,fill:L.color,filter:"url(#softShadow)"},g);
  const t=el("text",{x:s.x,y:s.y+tg.dy+2.5,"text-anchor":"middle","font-size":"8.5",
    fill:"#fff","font-weight":"700","letter-spacing":"0.5"},g);
  t.textContent=tg.text;
  ANCH.push([g, s.x, s.y+tg.dy-1.5]);
}

// ════════ 站点 ════════
// 标签自动避让布局（东京/北京地铁图风格：水平文字，每站在 8 个方位中选不重叠的位置）
// 高优先级(p0/枢纽)先占位；全部标签互不重叠 → 任何缩放级别的可见子集也不重叠
function stnR(s){ return s.hub?5 : (s.ln.length>1?3.4 : (s.ln.every(k=>LINES[k].lr)?2.3:2.8)); }
function labelDims(s,sc){
  sc = sc || s._lsc || 1;
  const fs = (s.hub?7.2 : (s.p===2?5.0:5.9))*sc;
  const zfs = fs*0.74;
  const w = Math.max(s.en.length*fs*0.56, s.zh.length*zfs*1.02)+1.6;
  const h = fs + zfs*1.15 + 1.0;
  return {fs,zfs,w,h};
}
const LPAD=0.7, obst=[];
function lblHit(b){ for(const o of obst){
  if(b.x0-LPAD<o.x1 && b.x1+LPAD>o.x0 && b.y0-LPAD<o.y1 && b.y1+LPAD>o.y0) return true; } return false; }
function lblOverlap(b){ let a=0; for(const o of obst){
  const w=Math.min(b.x1,o.x1)-Math.max(b.x0,o.x0), h=Math.min(b.y1,o.y1)-Math.max(b.y0,o.y0);
  if(w>0&&h>0) a+=w*h; } return a; }
// 站点圆点与年份标签先登记为障碍
for(const s of STATIONS){ const r=stnR(s)+0.8;
  obst.push({x0:s.x-r,y0:s.y-r,x1:s.x+r,y1:s.y+r}); }
for(const tg of YEAR_TAGS){ const st=$id(ROUTES[tg.rk][tg.idx]);

const LPOS={};
for(const s of [...STATIONS].sort((a,b)=>(a.p-b.p)||((b.hub||0)-(a.hub||0)))){
  const r=stnR(s);
  let best=null, bestA=Infinity;
  // 放不下时逐级缩小字号重试（密集小站用更小字，地铁图惯例）
  for(const sc of [1, 0.85, 0.72]){
    const {w,h}=labelDims(s,sc);
    bestA=Infinity;
    for(const [ri,d] of [r+2.0, r+5.0, r+8.5, r+12.5].entries()){
      const dd=d-0.2;
      const cands=[
        {a:"start", x:s.x+d,  b:[s.x+d,      s.y-h/2 ]},   // 东
        {a:"end",   x:s.x-d,  b:[s.x-d-w,    s.y-h/2 ]},   // 西
        {a:"start", x:s.x+dd, b:[s.x+dd,     s.y-dd-h]},   // 东北
        {a:"start", x:s.x+dd, b:[s.x+dd,     s.y+dd  ]},   // 东南
        {a:"end",   x:s.x-dd, b:[s.x-dd-w,   s.y-dd-h]},   // 西北
        {a:"end",   x:s.x-dd, b:[s.x-dd-w,   s.y+dd  ]},   // 西南
        {a:"middle",x:s.x,    b:[s.x-w/2,    s.y-d-h ]},   // 北
        {a:"middle",x:s.x,    b:[s.x-w/2,    s.y+d   ]},   // 南
      ];
      for(const c of cands){
        const box={x0:c.b[0],y0:c.b[1],x1:c.b[0]+w,y1:c.b[1]+h};
        if(!lblHit(box)){ best={a:c.a,x:c.x,box,ring:ri}; bestA=0; break; }
        const a=lblOverlap(box);
        if(a<bestA){ bestA=a; best={a:c.a,x:c.x,box,ring:ri}; }
      }
      if(bestA===0) break;
    }
    s._lsc=sc;
    if(bestA===0) break;
  }
  // 所有方位/字号都放不下 → 非枢纽站降级为 p3（深缩放才显示，届时反向缩放已消除重叠）
  if(bestA>0 && !s.hub) s._p3=true;
  obst.push(best.box);
  LPOS[s.id]=best;
}

// ════════ 行程规划（点两站 · Dijkstra 含换乘） ════════
const gNav = el("g",{"pointer-events":"none"});
const navBar = document.getElementById("navBar");
const XFER_MIN = 4;                       // 换乘惩罚(分)
function edgeMin(a,b,lk){                 // 区间行车时间估算(分)
  const km=Math.hypot((a.lo-b.lo)*92.5,(a.la-b.la)*111.1);
  const spd = LINES[lk].lr?16 : (lk[0]==="M"?45:42);
  return Math.max(1, km/spd*60);
}
const ADJ={}, STL={};                     // 状态图: "站id|线路" ；STL: 站→线路集合
function addE(k1,k2,w,kind,line,t){       // w=寻路权重 t=真实分钟
  (ADJ[k1]=ADJ[k1]||[]).push({to:k2,w,kind,line,t});
  (ADJ[k2]=ADJ[k2]||[]).push({to:k1,w,kind,line,t});
}
{
  // 仅用已通车线路建换乘图：未通车线路不参与换乘
  for(const rk in ROUTES){
    const lk=ROUTE_LINE[rk]||rk, arr=ROUTES[rk];
    if(!LINES[lk].open) continue;
    for(let i=0;i<arr.length-1;i++){
      const a=$id(arr[i]), b=$id(arr[i+1]), m=edgeMin(a,b,lk);
      addE(a.id+"|"+lk, b.id+"|"+lk, m, "ride", lk, m);
    }
  }
  for(const k in ADJ){ const i=k.indexOf("|");
    (STL[k.slice(0,i)]=STL[k.slice(0,i)]||new Set()).add(k.slice(i+1)); }
  for(const id in STL){
    const ls=[...STL[id]];
    for(let i=0;i<ls.length;i++) for(let j=i+1;j<ls.length;j++)
      addE(id+"|"+ls[i], id+"|"+ls[j], XFER_MIN, "xfer", null);
  }
}
function dijkstra(o,dst){
  const dist={},prev={},pe={},Q=new Set(Object.keys(ADJ));
  for(const k of Q) dist[k]=Infinity;
  for(const l of STL[o.id]) dist[o.id+"|"+l]=0;
  while(Q.size){
    let u=null,du=Infinity;
    for(const k of Q){ if(dist[k]<du){du=dist[k];u=k;} }
    if(u===null) break;
    Q.delete(u);
    for(const e of ADJ[u]){ const nd=du+e.w;
      if(nd<dist[e.to]){ dist[e.to]=nd; prev[e.to]=u; pe[e.to]=e; } }
  }
  let bk=null,bd=Infinity;
  for(const l of STL[dst.id]){ const k=dst.id+"|"+l;
    if(dist[k]<bd){ bd=dist[k]; bk=k; } }
  if(bk===null||bd===Infinity) return null;
  const edges=[]; let k=bk;
  while(prev[k]!==undefined){ edges.unshift({e:pe[k],from:prev[k],to:k}); k=prev[k]; }
  return {min:bd, edges};
}
function buildLegs(edges){
  const legs=[];
  for(const ed of edges){
    const fid=ed.from.slice(0,ed.from.indexOf("|")), tid=ed.to.slice(0,ed.to.indexOf("|"));
    if(ed.e.kind==="ride"){
      const last=legs[legs.length-1];
      if(last&&last.kind==="ride"&&last.line===ed.e.line&&last.sts[last.sts.length-1].id===fid)
        last.sts.push($id(tid));
      else legs.push({kind:"ride",line:ed.e.line,sts:[$id(fid),$id(tid)]});
    } else if(ed.e.kind==="walk"){
      legs.push({kind:"walk",sts:[$id(fid),$id(tid)]});
    }
  }
  return legs;
}
let nav={o:null,route:null};
function navMsg(html){
  navBar.innerHTML=html+`<button id="navClose">✕</button>`;
  navBar.classList.add("show");
  document.getElementById("navClose").onclick=ev=>{ev.stopPropagation();clearNav();};
}
function clearNav(){
  if(!nav.o&&!nav.route) return;
  nav={o:null,route:null}; gNav.innerHTML="";
  NAVBW.length=0; NAVANCH.length=0;
  navBar.classList.remove("show"); svg.classList.remove("navOn");
}
function markPin(s,color,txt,bounce){
  const g=el("g",{filter:"url(#softShadow)"},gNav);    // 外层：反向缩放锚定
  const gi=el("g",{},g);                                // 内层：弹跳动画
  el("circle",{cx:s.x,cy:s.y-9,r:6.2,fill:color,stroke:"#fff","stroke-width":"1.6"},gi);
  el("path",{d:`M${s.x-2.6},${s.y-4.4} L${s.x},${s.y-0.4} L${s.x+2.6},${s.y-4.4} Z`,fill:color},gi);
  const t=el("text",{x:s.x,y:s.y-6.7,"text-anchor":"middle","font-size":"6.2",
    fill:"#fff","font-weight":"800"},gi);
  t.textContent=txt;
  if(bounce) el("animateTransform",{attributeName:"transform",type:"translate",
    values:"0 0;0 -5;0 0;0 -2.2;0 0;0 0", keyTimes:"0;0.3;0.55;0.7;0.82;1",
    dur:"1.4s", repeatCount:"indefinite"},gi);
  NAVANCH.push([g,s.x,s.y]);
}
// 起点选中动画：脉冲涟漪 + 跳动图钉
function originFx(s){
  gNav.innerHTML=""; NAVBW.length=0; NAVANCH.length=0;
  const g=el("g",{},gNav);
  for(const begin of ["0s","-0.7s"]){
    const c=el("circle",{cx:s.x,cy:s.y,r:4,fill:"none",
      stroke:"#1d4fa8","stroke-width":"1.6"},g);
    el("animate",{attributeName:"r",values:"3.5;17",dur:"1.4s",
      begin,repeatCount:"indefinite"},c);
    el("animate",{attributeName:"opacity",values:"0.75;0",dur:"1.4s",
      begin,repeatCount:"indefinite"},c);
  }
  NAVANCH.push([g,s.x,s.y]);
  markPin(s,"#1d4fa8","起",true);
  applyLS(true);
}
function drawRoute(rt,dst){
  gNav.innerHTML=""; NAVBW.length=0; NAVANCH.length=0;
  for(const leg of buildLegs(rt.edges)){
    if(leg.kind==="walk"){
      NAVBW.push({el:el("path",{d:roundedPath(leg.sts.map(s=>[s.x,s.y]),8),fill:"none",stroke:"#555",
        "stroke-width":"2.4","stroke-dasharray":"3 3","stroke-linecap":"round"},gNav), w:2.4});
      continue;
    }
    const off=ROUTE_OFF[leg.line]||[0,0];
    const d=roundedPath(leg.sts.map(s=>[s.x+off[0],s.y+off[1]]),8);
    NAVBW.push({el:el("path",{d,fill:"none",stroke:"#fff","stroke-width":"9",
      "stroke-linecap":"round","stroke-linejoin":"round",opacity:"0.92"},gNav), w:9});
    NAVBW.push({el:el("path",{d,fill:"none",stroke:LINES[leg.line].color,"stroke-width":"5.2",
      "stroke-linecap":"round","stroke-linejoin":"round"},gNav), w:5.2});
    for(const s of leg.sts){
      const c=el("circle",{cx:s.x+off[0],cy:s.y+off[1],r:2,fill:"#fff",
        stroke:"#26262a","stroke-width":"1.1"},gNav);
      NAVANCH.push([c,s.x+off[0],s.y+off[1]]);
    }
  }
  markPin(nav.o,"#1d4fa8","起",true); markPin(dst,"#d0342c","终");
  applyLS(true);
}
function busNote(st){   // 站点所在线路均未通车时的说明
  if(STL[st.id]) return "";
  const yrs=[...new Set(st.ln.map(k=>`${LINES[k].name}（预计${LINES[k].year}年通车）`))];
  return `<div class="t2 warn">⚠ ${st.zh} 仅由 ${yrs.join("、")} 服务</div>`;
}
function setDest(s){
  if(!STL[nav.o.id] || !STL[s.id]){
    navMsg(`<div class="t1">🚌 ${nav.o.zh} → ${s.zh} · 需搭乘 Bus 换乘</div>
      <div class="t2">两站间暂无已通车的轨道交通换乘路线，建议用 Google Maps 查询公交接驳</div>`
      + busNote(nav.o) + busNote(s));
    return;
  }
  const rt=dijkstra(nav.o,s);
  if(!rt){ navMsg(`<div class="t1">🚌 两站间暂无轨道换乘 · 需搭乘 Bus</div>
    <div class="t2">建议用 Google Maps 查询公交接驳路线</div>`); return; }
  nav.route=rt;
  drawRoute(rt,s); svg.classList.add("navOn"); sheet.classList.remove("show");
  const legs=buildLegs(rt.edges);
  const trueMin=rt.edges.reduce((a,ed)=>a+(ed.e.t??ed.e.w),0);
  const nx=rt.edges.filter(e=>e.e.kind!=="ride").length;
  const seq=legs.map(l=>l.kind==="walk" ? `<b style="color:#555">步行</b>`
    : `<b style="color:${LINES[l.line].color}">${l.line}</b> ${l.sts.length-1}站`)
    .join(`<span style="opacity:.45"> › </span>`);
  const fut=[...new Set(legs.filter(l=>l.kind==="ride"&&!LINES[l.line].open)
    .map(l=>`${LINES[l.line].name}（${LINES[l.line].year}）`))];
  navMsg(`<div class="t1">${nav.o.zh} → ${s.zh} · 约 ${Math.round(trueMin)} 分钟</div>
    <div class="t2">${seq} · 换乘 ${nx} 次 · 时间为估算</div>`
    +(fut.length?`<div class="t2 warn">⚠ 途经未通车线路：${fut.join("、")}</div>`:""));
}
function stnTap(s){
  if(nav.o && !nav.route && s.id!==nav.o.id){ setDest(s); return; }
  clearNav(); nav.o=s;
  navMsg(`<div class="t1">🧭 起点：${s.zh} ${s.en}</div>
    <div class="t2">再点另一站设为终点 · 点空白处取消</div>`);
  originFx(s);
  showSheet(s);
}

// ════════ 缩放 / 平移 ════════
const VB={x:0,y:-6,w:900*K,h:1236*K};
let vb={...VB};
// 反向缩放（北京地铁风格）：深度放大时站点符号/文字/年份牌保持屏幕恒定大小，
// 只有线路几何被拉开 → 越放大越清爽，不会挤成一团
const LSREF=340;
let curLS=-1;
function applyLS(force){
  const ls=Math.min(1, vb.w/LSREF);
  if(!force && Math.abs(ls-curLS)<0.015) return;
  curLS=ls;
  const t=1-ls, lsr=ls.toFixed(3);
  for(const s of STATIONS)
    s._g.setAttribute("transform",`translate(${(s.x*t).toFixed(2)} ${(s.y*t).toFixed(2)}) scale(${lsr})`);
  for(const [g,ax,ay] of ANCH.concat(NAVANCH))
    g.setAttribute("transform",`translate(${(ax*t).toFixed(2)} ${(ay*t).toFixed(2)}) scale(${lsr})`);
  const lw=Math.sqrt(ls);
  for(const p of BW.concat(NAVBW))
    p.el.setAttribute("stroke-width",(p.w*lw).toFixed(2));
}
function apply(){
  svg.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  svg.dataset.z = vb.w<=170 ? "3" : (vb.w<=340 ? "2" : (vb.w<=620 ? "1" : "0"));
  applyLS(false);
}
const ZMIN=55, ZMAX=1700;
function zoomAt(f,cx,cy){
  const nw=Math.min(Math.max(vb.w*f,ZMIN),ZMAX), nh=nw*(VB.h/VB.w);
  vb.x=cx-(cx-vb.x)*(nw/vb.w); vb.y=cy-(cy-vb.y)*(nh/vb.h);
  vb.w=nw; vb.h=nh; apply();
}
function pt(cx,cy){ const r=svg.getBoundingClientRect();
  return {x:vb.x+(cx-r.left)/r.width*vb.w, y:vb.y+(cy-r.top)/r.height*vb.h}; }
document.getElementById("zin").onclick=()=>zoomAt(0.72,vb.x+vb.w/2,vb.y+vb.h/2);
document.getElementById("zout").onclick=()=>zoomAt(1.38,vb.x+vb.w/2,vb.y+vb.h/2);
document.getElementById("zreset").onclick=()=>{vb={...VB};apply();};
svg.addEventListener("wheel",e=>{e.preventDefault();
  const p=pt(e.clientX,e.clientY); zoomAt(e.deltaY>0?1.12:0.9,p.x,p.y);},{passive:false});

// 双击空白 = 放大；双击后第二指不松开、上下拖动 = 连续缩放（上=放大 下=缩小）
let drag=null,pinch=null,dragMoved=false,dtz=null,lastTap={t:-1e4,x:0,y:0};
svg.addEventListener("pointerdown",e=>{
  dragMoved=false;
  const now=performance.now();
  const onStn=e.target.closest && e.target.closest(".stn");
  if(!onStn && !pinch && now-lastTap.t<350 &&
     Math.hypot(e.clientX-lastTap.x,e.clientY-lastTap.y)<32){
    const r=svg.getBoundingClientRect();
    dtz={y0:e.clientY, w0:vb.w, moved:false, px:pt(e.clientX,e.clientY),
         rx:(e.clientX-r.left)/r.width, ry:(e.clientY-r.top)/r.height};
    lastTap={t:-1e4,x:0,y:0};
    return;
  }
  lastTap={t:now,x:e.clientX,y:e.clientY};
  drag={x:e.clientX,y:e.clientY,vx:vb.x,vy:vb.y};
});
svg.addEventListener("pointermove",e=>{
  if(dtz){
    const dy=e.clientY-dtz.y0;
    if(Math.abs(dy)>5) dtz.moved=true;
    if(dtz.moved){
      dragMoved=true;
      const nw=Math.min(Math.max(dtz.w0*Math.exp(dy/160),ZMIN),ZMAX), nh=nw*(VB.h/VB.w);
      vb.x=dtz.px.x-dtz.rx*nw; vb.y=dtz.px.y-dtz.ry*nh;
      vb.w=nw; vb.h=nh; apply();
    }
    return;
  }
  if(!drag||pinch)return;
  if(Math.hypot(e.clientX-drag.x,e.clientY-drag.y)>6) dragMoved=true;
  const r=svg.getBoundingClientRect();
  vb.x=drag.vx-(e.clientX-drag.x)/r.width*vb.w;
  vb.y=drag.vy-(e.clientY-drag.y)/r.height*vb.h; apply();
});
window.addEventListener("pointerup",()=>{
  if(dtz){
    if(!dtz.moved) zoomAt(0.55,dtz.px.x,dtz.px.y);   // 纯双击 → 放大一级
    dragMoved=true; dtz=null;
  }
  drag=null;
});
svg.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    pinch={d,w:vb.w,cx:(e.touches[0].clientX+e.touches[1].clientX)/2,
           cy:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:true});
svg.addEventListener("touchmove",e=>{
  if(pinch&&e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    const c=pt(pinch.cx,pinch.cy);
    const nw=Math.min(Math.max(pinch.w*(pinch.d/d),ZMIN),ZMAX);
    vb.x=c.x-(c.x-vb.x)*(nw/vb.w); vb.y=c.y-(c.y-vb.y)*(nw*(VB.h/VB.w)/vb.h);
    vb.w=nw; vb.h=nw*(VB.h/VB.w); apply();
  }
},{passive:false});
svg.addEventListener("touchend",e=>{if(e.touches.length<2)pinch=null;},{passive:true});
apply();

// 直达链接：#s=站点id → 定位并打开详情
{
  const m=location.hash.match(/s=([a-z0-9]+)/);
  if(m){ const s=$id(m[1]); if(s){ focusStation(s); showSheet(s); } }
}

</script>
